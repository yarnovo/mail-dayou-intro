name: deploy
on:
  push:
    branches: [main]
    paths:
      - "intro.config.json"
      - "intro/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download akong-intro-astro template
        run: |
          curl -fsSLo template.tar.gz "https://codeload.github.com/yarnovo/akong-intro-astro/tar.gz/main"
          mkdir -p __template
          tar xzf template.tar.gz --strip-components=1 -C __template

      - name: Download avatar svg
        run: |
          curl -fsSLo avatar.svg "https://raw.githubusercontent.com/yarnovo/akong-avatars/main/avatars/dayou.svg"

      - name: Inject config + audio + transcript + avatar
        run: |
          mkdir -p __template/public
          cp intro.config.json         __template/public/intro.config.json
          cp intro/audio/intro-zh.mp3  __template/public/intro-zh.mp3
          cp intro/text/intro-zh.md    __template/public/transcript.md
          cp avatar.svg                __template/public/avatar.svg

      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: pnpm install + astro build
        working-directory: __template
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Upload to OSS (Menci/upload-to-oss · 业界标准 · 增量 · 删孤儿)
        uses: Menci/upload-to-oss@beta-v3
        with:
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          endpoint: oss-cn-hangzhou.aliyuncs.com
          bucket: agentaily-mail-intro
          local-path: __template/dist
          remote-path: /
          no-delete-remote-files: false

      - name: Verify
        run: curl -kfL "https://m.mail.agentaily.com/?cb=$RANDOM" -o /dev/null -w "HTTP %{http_code}\n" || true
